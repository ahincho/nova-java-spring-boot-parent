name: Publish Parent POM

# Manually triggered publish for nova-spring-boot-parent. The reusable
# workflow ahincho/nova-devops/.github/workflows/reusable-publish-maven.yml@main
# has a gap: it doesn't forward a cross-repo read token to nova-setup-java,
# causing 401 Unauthorized when reading nova-spring-boot-bom from the
# nova-bom repo's GitHub Packages. This workflow inlines that logic so
# the parent can be published standalone. Tracked to revert to the reusable
# workflow once it's fixed upstream.
on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry-run: deploy to local file:// repo for verification'
        required: false
        type: string
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Nova Setup Java (cross-repo reads via NOVA_PACKAGES_READ_TOKEN)
        uses: ahincho/nova-devops/.github/actions/nova-setup-java@main
        with:
          java-version: '25'
          build-tool: maven
          packages-read-token: ${{ secrets.NOVA_PACKAGES_READ_TOKEN }}

      # nova-setup-java configured <server id="nova-packages-read-bom/starter">
      # for cross-repo reads. But the <server id="github"> it set up uses the
      # same EFFECTIVE_TOKEN (read-only). For deploy we need GITHUB_TOKEN
      # (write:packages). Append a <server id="github"> entry with the
      # write-capable token WITHOUT touching the cross-repo ones.

      - name: Build a clean settings.xml with all credentials
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          READ_TOKEN: ${{ secrets.NOVA_PACKAGES_READ_TOKEN }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                     xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                     xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 http://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>github</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${GITHUB_TOKEN}</password>
              </server>
              <server>
                <id>nova-packages-read-bom</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${READ_TOKEN}</password>
              </server>
              <server>
                <id>nova-packages-read-starter</id>
                <username>${GITHUB_ACTOR}</username>
                <password>${READ_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF
          echo "Maven settings.xml rebuilt with 3 servers:"
          echo "  - github (write:packages via GITHUB_TOKEN)"
          echo "  - nova-packages-read-{bom,starter} (read-only via NOVA_PACKAGES_READ_TOKEN)"
          # Echo but mask the passwords
          python3 -c "import re; print(re.sub(r'<password>[^<]*</password>', '<password>***</password>', open('/home/runner/.m2/settings.xml').read()))"

      - name: Deploy (or publish to local on dry-run)
        env:
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            mvn deploy -DskipTests -DaltDeploymentRepository=local::file:./target/dryrun-repo
          else
            mvn deploy -DskipTests
          fi
